<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Dados del Toji</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎲 ¡Lanza los Dados de Toji! 🎲</h1>
        
        <div class="dice-grid">
            <!-- Bloque del Dado 1 -->
            <div class="dice-wrapper">
                <div id="status-1" class="roll-status">ROLLING...</div>
                <div id="dice-1" class="dice azul">●</div>
            </div>
            <!-- Bloque del Dado 2 -->
            <div class="dice-wrapper">
                <div id="status-2" class="roll-status">ROLLING...</div>
                <div id="dice-2" class="dice amarillo">●</div>
            </div>
            <!-- Bloque del Dado 3 -->
            <div class="dice-wrapper">
                <div id="status-3" class="roll-status">ROLLING...</div>
                <div id="dice-3" class="dice verde">●</div>
            </div>
            <!-- Bloque del Dado 4 -->
            <div class="dice-wrapper">
                <div id="status-4" class="roll-status">ROLLING...</div>
                <div id="dice-4" class="dice morado">●</div>
            </div>
        </div>

        <button id="roll-btn">Tirar Dados</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
